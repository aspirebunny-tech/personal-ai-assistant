name: personal_ai_assistant
description: Personal AI Assistant - Notes App
version: 1.0.5+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.0
  socket_io_client: ^2.0.3+1

  # Local Storage (offline support)
  sqflite: ^2.3.2
  path: ^1.9.1
  shared_preferences: ^2.2.2

  # Voice Recognition
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1

  # UI
  flutter_staggered_animations: ^1.1.1
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  file_picker: ^8.0.0+1
  url_launcher: ^6.3.0
  package_info_plus: ^8.1.0
  path_provider: ^2.1.4
  open_filex: ^4.6.0

  # Notifications
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4

  # Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1

  # Utils
  uuid: ^4.3.3
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
